name = "rognidhi-frontend"
type = "javascript"
compatibility_date = "2024-01-01"

[build]
command = "cd frontend && npm install && npm run build"
cwd = "."

[build.upload]
format = "service-worker"

[env.production]
vars = { VITE_API_URL = "https://rognidhi-backend-jov8.onrender.com" }

[[routes]]
pattern = "*"
zone_name = "rognidhi.pages.dev"
